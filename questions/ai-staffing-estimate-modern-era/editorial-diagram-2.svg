<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">業務を3種類に分けるの整理</title><desc id="desc">ただし、人材派遣の価格は作業時間だけでは決まりません</desc>
<rect width="1200" height="675" fill="#fff"/><rect x="0.5" y="0.5" width="1199" height="674" fill="none" stroke="#111" stroke-width="1"/>
<text x="600" y="72" text-anchor="middle" font-size="24" letter-spacing="8" font-family="Arial, sans-serif" fill="#687386">STRUCTURE</text>
<text x="86" y="145" font-size="42" font-family="Arial, sans-serif" font-weight="700" fill="#111">業務を3種類に分けるの整理</text>
<g transform="translate(110,335)"><circle cx="0" cy="-7" r="6" fill="#111"/><text x="22" y="0" font-size="23" font-family="Arial, sans-serif" fill="#111">Question Note AIを前提とした人材派…</text></g>
<g transform="translate(110,399)"><circle cx="0" cy="-7" r="6" fill="#111"/><text x="22" y="0" font-size="23" font-family="Arial, sans-serif" fill="#111">AI利用範囲: 生成、要約、検索、分類、チェックな…</text></g>
<g transform="translate(110,463)"><circle cx="0" cy="-7" r="6" fill="#111"/><text x="22" y="0" font-size="23" font-family="Arial, sans-serif" fill="#111">AI非利用範囲: 個人情報、機密情報、最終判断、顧…</text></g>
<rect x="602" y="190" width="430" height="230" fill="#f7f7f7" stroke="#111" stroke-width="2"/><path d="M642 245h350M642 302h250M642 359h310" stroke="#111" stroke-width="4"/><circle cx="495" cy="225" r="82" fill="#111"/><circle cx="495" cy="395" r="52" fill="none" stroke="#111" stroke-width="3"/><path d="M548 225h72M547 395h72" stroke="#111" stroke-width="2"/>
