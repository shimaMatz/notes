<svg xmlns="http://www.w3.org/2000/svg" width="390" height="760" viewBox="0 0 390 760" role="img" aria-labelledby="t d"><title id="t">浴槽衛生詳細</title><desc id="d">一つの浴槽の測定値、清掃履歴、担当、次の確認操作を示す画面</desc><rect width="390" height="760" rx="34" fill="#eaf4f7"/><rect x="18" y="18" width="354" height="724" rx="28" fill="#fff"/><text x="38" y="60" font-family="sans-serif" font-size="18" fill="#17455a">‹ 設備一覧</text><text x="38" y="98" font-family="sans-serif" font-size="24" font-weight="700" fill="#17455a">露天浴槽</text><rect x="38" y="119" width="314" height="74" rx="16" fill="#fff0ee"/><text x="57" y="147" font-family="sans-serif" font-size="13" fill="#82594f">現在の状態</text><text x="57" y="175" font-family="sans-serif" font-size="17" font-weight="700" fill="#a14335">確認待ち ・ 担当 田中</text><g font-family="sans-serif"><text x="38" y="229" font-size="15" font-weight="700" fill="#345661">最新記録</text><text x="50" y="259" font-size="13" fill="#657b84">10:04　測定値 施設設定範囲外</text><text x="50" y="285" font-size="13" fill="#657b84">09:58　薬注装置 動作確認</text><text x="50" y="311" font-size="13" fill="#657b84">08:10　開店前清掃 完了</text><text x="38" y="354" font-size="15" font-weight="700" fill="#345661">対応履歴</text><line x1="55" y1="377" x2="55" y2="477" stroke="#bfd4db" stroke-width="3"/><circle cx="55" cy="389" r="7" fill="#d86151"/><text x="77" y="393" font-size="13" fill="#5f737b">確認依頼 ・ 自動</text><circle cx="55" cy="432" r="7" fill="#e0a643"/><text x="77" y="436" font-size="13" fill="#5f737b">再測定を割当 ・ 田中</text><circle cx="55" cy="475" r="7" fill="#6c939f"/><text x="77" y="479" font-size="13" fill="#5f737b">設備状態の確認待ち</text><rect x="38" y="510" width="314" height="105" rx="16" fill="#f2f8fa"/><text x="57" y="539" font-size="14" font-weight="700" fill="#345661">次の操作</text><text x="57" y="565" font-size="13" fill="#657b84">施設手順に従い設備確認と再測定。</text><text x="57" y="588" font-size="13" fill="#657b84">責任者が再開可否を記録します。</text><rect x="38" y="633" width="314" height="50" rx="25" fill="#176b81"/><text x="128" y="664" font-size="15" font-weight="700" fill="#fff">再測定を記録</text></g></svg>
