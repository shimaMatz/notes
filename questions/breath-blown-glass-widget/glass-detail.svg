<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="t d"><title id="t">息でガラス玉を作る画面</title><desc id="d">3秒の息の強弱を透明な形に変える操作画面</desc><defs><radialGradient id="g"><stop stop-color="#fff"/><stop offset=".35" stop-color="#d9f5f2" stop-opacity=".9"/><stop offset="1" stop-color="#5c9fab" stop-opacity=".65"/></radialGradient></defs><rect width="900" height="560" fill="#dfeeed"/><rect x="230" y="25" width="440" height="515" rx="42" fill="#102a31"/><text x="328" y="76" font-size="25" font-family="sans-serif" fill="#fff">一息を形にする</text><path d="M310 320c35-35 70 35 105 0s70 35 105 0 70 35 105 0" fill="none" stroke="#9ce2e7" stroke-width="7" stroke-linecap="round"/><ellipse cx="450" cy="235" rx="105" ry="90" fill="url(#g)" stroke="#fff" stroke-width="5"/><circle cx="420" cy="210" r="10" fill="#fff" opacity=".65"/><circle cx="480" cy="255" r="7" fill="#fff" opacity=".55"/><text x="377" y="370" font-size="18" font-family="sans-serif" fill="#fff">あと 1.2 秒</text><rect x="300" y="405" width="300" height="55" rx="27" fill="#d84a2b"/><text x="354" y="439" font-size="18" font-family="sans-serif" fill="#fff">マイクへ静かに吹く</text><text x="338" y="492" font-size="14" font-family="sans-serif" fill="#b8d3d5">音声は保存せず強弱だけを使います</text></svg>
