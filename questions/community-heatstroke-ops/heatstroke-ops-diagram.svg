<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">地域屋外活動向け暑熱対策オペレーションサービスの全体像</title>
  <desc id="desc">気象データ確認から現場判断、連絡、記録、振り返りまでを一つの流れで示す図</desc>
  <rect width="960" height="540" fill="#fff7ef" />
  <rect x="40" y="44" width="880" height="452" rx="28" fill="#fffdf9" stroke="#d4c8b8" stroke-width="2" />
  <text x="70" y="92" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="28" font-weight="700" fill="#241f1a">
    猛暑下の地域屋外活動を支える運営オペレーション
  </text>
  <text x="70" y="126" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#6a5f55">
    天気アプリでは判断できず、チャットだけでは記録が残らない領域を埋める
  </text>

  <rect x="72" y="170" width="188" height="120" rx="20" fill="#f6d7c6" stroke="#9a3412" />
  <text x="96" y="208" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#241f1a">1. 予測確認</text>
  <text x="96" y="242" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">WBGT</text>
  <text x="96" y="268" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">警戒アラート</text>

  <rect x="292" y="170" width="188" height="120" rx="20" fill="#fce7d6" stroke="#9a3412" />
  <text x="316" y="208" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#241f1a">2. ルール判定</text>
  <text x="316" y="242" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">中止・短縮</text>
  <text x="316" y="268" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">休憩間隔</text>

  <rect x="512" y="170" width="188" height="120" rx="20" fill="#fdeedf" stroke="#9a3412" />
  <text x="536" y="208" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#241f1a">3. 一斉連絡</text>
  <text x="536" y="242" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">保護者</text>
  <text x="536" y="268" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">指導者・運営</text>

  <rect x="732" y="170" width="156" height="120" rx="20" fill="#fff2e8" stroke="#9a3412" />
  <text x="756" y="208" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#241f1a">4. 記録</text>
  <text x="756" y="242" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">水分</text>
  <text x="756" y="268" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">症状・対応</text>

  <path d="M260 230 H292" stroke="#9a3412" stroke-width="4" fill="none" />
  <path d="M480 230 H512" stroke="#9a3412" stroke-width="4" fill="none" />
  <path d="M700 230 H732" stroke="#9a3412" stroke-width="4" fill="none" />

  <rect x="92" y="342" width="776" height="112" rx="24" fill="#241f1a" opacity="0.92" />
  <text x="124" y="386" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#fff8ef">
    既存手段の限界
  </text>
  <text x="124" y="420" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#fff8ef">
    天気アプリ: 地域の暑さは見えるが、団体ごとの中止基準と連絡フローがない
  </text>
  <text x="124" y="448" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#fff8ef">
    チャット: 伝達はできるが、休憩実績や症状記録、後日の説明責任が残らない
  </text>
</svg>
