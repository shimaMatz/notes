<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">マンション防災訓練と備蓄確認の全体像</title>
  <desc id="desc">管理組合、住民、備蓄、訓練記録をつなぐ小規模サービスの図</desc>
  <rect width="960" height="540" fill="#fff8ef"/>
  <rect x="48" y="42" width="864" height="456" rx="28" fill="#fcfaf6" stroke="#d4c8b8" stroke-width="3"/>
  <text x="80" y="96" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="27" font-weight="700" fill="#241f1a">マンション防災の参加・備蓄・要配慮をそろえる</text>
  <text x="80" y="132" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#6a5f55">訓練参加、備蓄期限、階段移動、安否確認を管理組合の軽い台帳にまとめる。</text>
  <g font-family="'Hiragino Sans','Yu Gothic',sans-serif">
    <rect x="92" y="198" width="176" height="116" rx="18" fill="#f6d7c6" stroke="#9a3412" stroke-width="2"/>
    <text x="130" y="238" font-size="21" font-weight="700" fill="#241f1a">住民</text>
    <text x="118" y="268" font-size="16" fill="#6a5f55">参加可否・要配慮</text>
    <rect x="310" y="198" width="176" height="116" rx="18" fill="#ffffff" stroke="#d4c8b8" stroke-width="2"/>
    <text x="342" y="238" font-size="21" font-weight="700" fill="#241f1a">管理組合</text>
    <text x="334" y="268" font-size="16" fill="#6a5f55">訓練・連絡</text>
    <rect x="528" y="198" width="176" height="116" rx="18" fill="#ffffff" stroke="#d4c8b8" stroke-width="2"/>
    <text x="572" y="238" font-size="21" font-weight="700" fill="#241f1a">備蓄</text>
    <text x="552" y="268" font-size="16" fill="#6a5f55">期限・場所・数量</text>
    <rect x="382" y="372" width="196" height="78" rx="18" fill="#241f1a"/>
    <text x="420" y="405" font-size="20" font-weight="700" fill="#fff8ef">訓練後レポート</text>
    <text x="418" y="432" font-size="15" fill="#f8ede3">未参加 / 不足 / 改善点</text>
    <path d="M272 256 H306" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M490 256 H524" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M480 318 V366" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
