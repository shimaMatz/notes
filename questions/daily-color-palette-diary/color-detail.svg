<svg xmlns="http://www.w3.org/2000/svg" width="390" height="760" viewBox="0 0 390 760" role="img" aria-labelledby="t d"><title id="t">色標本の詳細</title><desc id="d">一つの色標本の元景色、抽出色、履歴、次の配色操作を示す画面</desc><rect width="390" height="760" rx="34" fill="#f3efe9"/><rect x="18" y="18" width="354" height="724" rx="28" fill="#fffdf9"/><text x="38" y="60" font-family="sans-serif" font-size="18" fill="#4c433b">‹ 6月の標本</text><rect x="38" y="84" width="314" height="194" rx="22" fill="#7e9fb8"/><circle cx="280" cy="145" r="54" fill="#bed0da" opacity=".75"/><path d="M38 228 C120 170 210 254 352 186 V278 H38Z" fill="#4f6e78" opacity=".75"/><text x="55" y="304" font-family="sans-serif" font-size="13" fill="#83786e">6月19日 ・ 所有者 わたし</text><text x="38" y="345" font-family="sans-serif" font-size="27" font-weight="700" fill="#3f3832">雨あがり</text><rect x="38" y="369" width="88" height="88" rx="20" fill="#7e9fb8"/><text x="146" y="400" font-family="monospace" font-size="16" fill="#554d47">#7E9FB8</text><text x="146" y="430" font-family="sans-serif" font-size="13" fill="#83786e">明るさ 61 ・ 青み 24</text><text x="38" y="498" font-family="sans-serif" font-size="15" font-weight="700" fill="#4c433b">採集履歴</text><text x="48" y="531" font-family="sans-serif" font-size="13" fill="#83786e">18:42　駅前の水たまりを撮影</text><text x="48" y="558" font-family="sans-serif" font-size="13" fill="#83786e">18:43　候補3色から選択</text><rect x="38" y="590" width="314" height="48" rx="24" fill="#f0e7dc"/><text x="93" y="620" font-family="sans-serif" font-size="14" font-weight="700" fill="#5c5148">この色から配色をつくる</text><text x="122" y="692" font-family="sans-serif" font-size="12" fill="#958a80">前の色　　　共有　　　次の色</text></svg>
