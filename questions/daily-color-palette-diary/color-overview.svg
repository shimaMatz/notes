<svg xmlns="http://www.w3.org/2000/svg" width="390" height="760" viewBox="0 0 390 760" role="img" aria-labelledby="t d"><title id="t">色標本日記の月間一覧</title><desc id="d">今月集めた色標本と今日の採集ボタンを示す画面</desc><rect width="390" height="760" rx="34" fill="#f3efe9"/><rect x="18" y="18" width="354" height="724" rx="28" fill="#fffdf9"/><text x="38" y="60" font-family="sans-serif" font-size="14" fill="#796f64">2026年 6月</text><text x="38" y="94" font-family="sans-serif" font-size="26" font-weight="700" fill="#3f3832">色標本</text><text x="286" y="92" font-family="sans-serif" font-size="13" fill="#857a70">14 colors</text><g><rect x="38" y="124" width="92" height="92" rx="18" fill="#6f8f77"/><rect x="149" y="124" width="92" height="92" rx="18" fill="#d6a55e"/><rect x="260" y="124" width="92" height="92" rx="18" fill="#7e9fb8"/><rect x="38" y="235" width="92" height="92" rx="18" fill="#b96d67"/><rect x="149" y="235" width="92" height="92" rx="18" fill="#e3d6a0"/><rect x="260" y="235" width="92" height="92" rx="18" fill="#786e91"/><rect x="38" y="346" width="92" height="92" rx="18" fill="#9eaf88"/><rect x="149" y="346" width="92" height="92" rx="18" fill="#c58b77"/><rect x="260" y="346" width="92" height="92" rx="18" fill="#dae3df" stroke="#c7d1cd"/></g><g font-family="sans-serif" font-size="11" fill="#fff"><text x="48" y="203">苔の影</text><text x="159" y="203">午後の壁</text><text x="270" y="203">雨あがり</text><text x="48" y="314">古い傘</text><text x="159" y="314" fill="#675e42">麦の光</text><text x="270" y="314">夜の花</text></g><rect x="38" y="472" width="314" height="104" rx="20" fill="#f5eee5"/><text x="58" y="506" font-family="sans-serif" font-size="14" fill="#796f64">今日の色はまだ空白です</text><text x="58" y="537" font-family="sans-serif" font-size="18" font-weight="700" fill="#433b34">景色から一色だけ</text><rect x="202" y="590" width="150" height="54" rx="27" fill="#4d6758"/><text x="234" y="624" font-family="sans-serif" font-size="15" font-weight="700" fill="#fff">色を採集する</text><text x="112" y="710" font-family="sans-s