<g transform="translate(110,399)"><circle cx="0" cy="-7" r="6" fill="#111"/><text x="22" y="0" font-size="23" font-family="Arial, sans-serif" fill="#111">連続日数を競わせず、空白も月の配色として残す。</text></g>
<g transform="translate(110,463)"><circle cx="0" cy="-7" r="6" fill="#111"/><text x="22" y="0" font-size="23" font-family="Arial, sans-serif" fill="#111">色覚差に備え、色名、明度、パターンでも区別する。</text></g>
