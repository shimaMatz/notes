<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">リスクと最初の検証の確認点</title><desc id="desc">50人に6週間提供し、週3回以上の採集率、月末カードの保存率、年額960円の購入意思を測ります</desc>
