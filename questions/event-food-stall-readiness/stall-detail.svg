<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="t d"><title id="t">出店準備詳細</title><desc id="d">不足書類と当日確認項目を管理する画面</desc><rect width="900" height="560" fill="#e2ebe3"/><rect x="210" y="25" width="480" height="515" rx="34" fill="#fff" stroke="#25332b" stroke-width="4"/><text x="250" y="75" font-size="26" font-family="sans-serif">山田焼きそば</text><text x="250" y="108" font-size="16" font-family="sans-serif" fill="#68726c">屋台型臨時営業 / 区画 A-04</text><rect x="250" y="137" width="400" height="82" rx="14" fill="#fee4dd"/><text x="272" y="170" font-size="18" font-family="sans-serif">不足：手洗い設備の仕様</text><text x="272" y="199" font-size="15" font-family="sans-serif">根拠：横浜市「行事で食品を…」p.3</text><text x="250" y="266" font-size="20" font-family="sans-serif">当日チェック</text><g font-family="sans-serif" font-size="18"><text x="255" y="305">☑ 食材は許可施設で下処理</text><text x="255" y="342">☐ 手洗い水・石けん・消毒</text><text x="255" y="379">☐ 冷蔵温度 10℃以下</text><text x="255" y="416">☐ 是正後の再確認</text></g><rect x="250" y="458" width="175" height="50" rx="12" fill="#d84a2b"/><text x="285" y="490" font-size="17" font-family="sans-serif" fill="#fff">差し戻す</text><rect x="445" y="458" width="175" height="50" rx="12" fill="#244f40"/><text x="486" y="490" font-size="17" font-family="sans-serif" fill="#fff">確認完了</text></svg>
