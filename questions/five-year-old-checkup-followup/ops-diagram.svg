<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">5歳児健診後フォローの運用図</title>
  <desc id="desc">健診会場から保護者説明、紹介先調整、進捗確認、就学前支援開始までの流れを示す図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffaf4" />
      <stop offset="100%" stop-color="#f6e3d4" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#9a3412" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#241f1a" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a3412" />
    </marker>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#bg)" />
  <text x="56" y="62" fill="#9a3412" font-size="20" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700" letter-spacing="1.5">FOLLOW-UP OPS</text>
  <text x="56" y="104" fill="#241f1a" font-size="34" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">5歳児健診後の支援接続を一枚で回す</text>
  <text x="56" y="136" fill="#6a5f55" font-size="18" font-family="'Hiragino Sans','Yu Gothic',sans-serif">結果説明のあとに散る連絡、紹介先、期限、完了確認を同じ台帳に束ねる。</text>

  <rect x="56" y="186" width="200" height="124" rx="24" fill="#fff" stroke="#d4c8b8" filter="url(#shadow)" />
  <text x="84" y="224" fill="#9a3412" font-size="16" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">1. 健診会場</text>
  <text x="84" y="252" fill="#241f1a" font-size="20" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">要フォロー案件を登録</text>
  <text x="84" y="279" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">判定区分</text>
  <text x="84" y="299" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">保護者説明要点</text>

  <rect x="310" y="186" width="200" height="124" rx="24" fill="#fff" stroke="#d4c8b8" filter="url(#shadow)" />
  <text x="338" y="224" fill="#9a3412" font-size="16" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">2. 保護者連絡</text>
  <text x="338" y="252" fill="#241f1a" font-size="20" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">次アクションを確定</text>
  <text x="338" y="279" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">初回連絡期限</text>
  <text x="338" y="299" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">面談予定</text>

  <rect x="564" y="186" width="200" height="124" rx="24" fill="#fff" stroke="#d4c8b8" filter="url(#shadow)" />
  <text x="592" y="224" fill="#9a3412" font-size="16" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">3. 紹介先調整</text>
  <text x="592" y="252" fill="#241f1a" font-size="20" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">発達相談や園共有へ接続</text>
  <text x="592" y="279" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">担当者</text>
  <text x="592" y="299" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">予約状況</text>

  <rect x="718" y="186" width="186" height="124" rx="24" fill="#fff7f2" stroke="#9a3412" filter="url(#shadow)" />
  <text x="746" y="224" fill="#9a3412" font-size="16" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">4. 就学前支援</text>
  <text x="746" y="252" fill="#241f1a" font-size="20" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">開始確認</text>
  <text x="746" y="279" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">支援開始日</text>
  <text x="746" y="299" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">未完了理由</text>

  <path d="M 256 248 H 310" fill="none" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M 510 248 H 564" fill="none" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M 764 248 H 718" fill="none" stroke="#9a3412" stroke-width="4" marker-end="url(#arrow)" />

  <rect x="56" y="362" width="848" height="122" rx="28" fill="#fff" stroke="#d4c8b8" filter="url(#shadow)" />
  <rect x="84" y="388" width="180" height="70" rx="18" fill="url(#accent)" />
  <text x="108" y="419" fill="#fff" font-size="16" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">見るべき指標</text>
  <text x="108" y="444" fill="#fff" font-size="14" font-family="'Hiragino Sans','Yu Gothic',sans-serif">初回連絡までの日数</text>

  <text x="308" y="413" fill="#241f1a" font-size="18" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">未連絡</text>
  <text x="308" y="439" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">説明済みだが次アクション未確定</text>

  <text x="510" y="413" fill="#241f1a" font-size="18" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">日程未確定</text>
  <text x="510" y="439" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">紹介先または面談日の未設定案件</text>

  <text x="716" y="413" fill="#241f1a" font-size="18" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-weight="700">支援開始済み</text>
  <text x="716" y="439" fill="#6a5f55" font-size="15" font-family="'Hiragino Sans','Yu Gothic',sans-serif">就学前支援へ接続できた案件</text>
</svg>
