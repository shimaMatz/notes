<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">遠方家族の墓参り・墓地清掃の依頼ずれを埋める小規模サービス案</title><desc id="desc">高齢化や人口移動により、墓参りや墓地清掃を家族だけで続けにくい世帯が増えています。課</desc>
