<text x="88" y="88" font-size="24" font-family="Arial, sans-serif" letter-spacing="4" fill="#555">NOTE / ARCHIVE</text>
<text x="88" y="168" font-size="54" font-family="Arial, sans-serif" font-weight="700" fill="#111">遠方家族の墓参り・墓地清掃の依頼ずれ</text>
<text x="88" y="246.3" font-size="54" font-family="Arial, sans-serif" font-weight="700" fill="#111">を埋める小規模サービス案</text>
<circle cx="820" cy="255" r="122" fill="#111"/><rect x="700" y="390" width="240" height="18" fill="#111"/><path d="M760 140h120M740 180h160" stroke="#111" stroke-width="3"/>
<g transform="translate(650,250)"><rect x="0" y="0" width="118" height="64" fill="#f7f7f7" stroke="#111"/><text x="59" y="38" text-anchor="middle" font-size="20" font-weight="700">NOTE</text></g>
<g transform="translate(800,250)"><rect x="0" y="0" width="118" height="64" fill="#f7f7f7" stroke="#111"/><text x="59" y="38" text-anchor="middle" font-size="20" font-weight="700">READ</text></g>
<g transform="translate(950,250)"><rect x="0" y="0" width="118" height="64" fill="#f7f7f7" stroke="#111"/><text x="59" y="38" text-anchor="middle" font-size="20" font-weight="700">USE</text></g>
<text x="600" y="600" text-anchor="middle" font-size="25" font-family="Arial, sans-serif" fill="#333">高齢化や人口移動により、墓参りや墓地清掃を家族だけで続けにくい世帯が増えています。課</text>
