<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">買い物困難者向け注文・配達枠調整サービスの全体像</title>
  <desc id="desc">利用者、地域店舗、配達協力者、見守り記録をつなぐ小規模運用の図</desc>
  <rect width="960" height="540" fill="#fff8ef"/>
  <rect x="42" y="40" width="876" height="460" rx="28" fill="#fcfaf6" stroke="#d4c8b8" stroke-width="3"/>
  <text x="80" y="92" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="28" font-weight="700" fill="#241f1a">買い物困難者の注文・配達枠を地域でそろえる</text>
  <text x="80" y="128" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#6a5f55">商品不足ではなく、注文確認、配達枠、安否メモ、精算記録が別々になることが現場負荷になる。</text>

  <g font-family="'Hiragino Sans','Yu Gothic',sans-serif">
    <rect x="76" y="188" width="182" height="124" rx="18" fill="#f6d7c6" stroke="#9a3412" stroke-width="2"/>
    <text x="112" y="228" font-size="22" font-weight="700" fill="#241f1a">利用者</text>
    <text x="105" y="260" font-size="16" fill="#6a5f55">電話・紙注文</text>
    <text x="105" y="286" font-size="16" fill="#6a5f55">重い物を頼みたい</text>

    <rect x="302" y="188" width="182" height="124" rx="18" fill="#ffffff" stroke="#d4c8b8" stroke-width="2"/>
    <text x="348" y="228" font-size="22" font-weight="700" fill="#241f1a">地域店舗</text>
    <text x="332" y="260" font-size="16" fill="#6a5f55">在庫・代替品</text>
    <text x="332" y="286" font-size="16" fill="#6a5f55">受け渡し準備</text>

    <rect x="528" y="188" width="182" height="124" rx="18" fill="#ffffff" stroke="#d4c8b8" stroke-width="2"/>
    <text x="562" y="228" font-size="22" font-weight="700" fill="#241f1a">配達協力者</text>
    <text x="558" y="260" font-size="16" fill="#6a5f55">空き時間・経路</text>
    <text x="558" y="286" font-size="16" fill="#6a5f55">受領確認</text>

    <rect x="752" y="188" width="132" height="124" rx="18" fill="#f6d7c6" stroke="#9a3412" stroke-width="2"/>
    <text x="781" y="228" font-size="22" font-weight="700" fill="#241f1a">家族</text>
    <text x="778" y="260" font-size="16" fill="#6a5f55">見守り</text>
    <text x="778" y="286" font-size="16" fill="#6a5f55">連絡</text>

    <path d="M262 250 H296" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M488 250 H522" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M714 250 H746" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>

    <rect x="174" y="372" width="612" height="78" rx="18" fill="#241f1a"/>
    <text x="230" y="404" font-size="20" font-weight="700" fill="#fff8ef">小さな調整台帳</text>
    <text x="230" y="432" font-size="16" fill="#f8ede3">注文、代替品、配達枠、見守りメモ、精算履歴を1回ごとに残す</text>
    <path d="M167 316 V366" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M393 316 V366" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M619 316 V366" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M818 316 V366" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
