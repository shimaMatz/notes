<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">質問からHTMLノートまでの流れ</title><desc id="desc">質問は記事化の入力であり、公開できるノートへ変換する作業単位になる。</desc>
<defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#c9d5e7" flood-opacity="0.45"/></filter></defs>
<rect width="1600" height="900" fill="#fbfcfe"/><rect x="8" y="8" width="1584" height="884" fill="none" stroke="#0f1b2d" stroke-width="2"/>
<text x="800" y="70" text-anchor="middle" font-size="24" letter-spacing="10" font-family="Arial, sans-serif" font-weight="700" fill="#667996">WORKFLOW</text>
<text x="800" y="132" text-anchor="middle" font-size="50" font-family="Arial, sans-serif" font-weight="700" fill="#0f1b2d">質問からHTMLノートまでの流れ</text>
<text x="800" y="184" text-anchor="middle" font-size="25" font-family="Arial, sans-serif" fill="#566981">質問文を起点に、記事・図解・公開確認までを一続きで扱う</text>

<g filter="url(#shadow)">
  <rect x="105" y="290" width="320" height="210" rx="18" fill="#fff" stroke="#c5d1df"/>
  <rect x="465" y="245" width="330" height="300" rx="18" fill="#fff" stroke="#c5d1df"/>
  <rect x="835" y="290" width="320" height="210" rx="18" fill="#fff" stroke="#c5d1df"/>
  <rect x="1195" y="245" width="300" height="300" rx="18" fill="#fff" stroke="#c5d1df"/>
</g>
<path d="M425 395h40M795 395h40M1155 395h40" stroke="#2f6fcb" stroke-width="5" stroke-linecap="round"/>
<text x="265" y="345" text-anchor="middle" font-size="31" font-family="Arial, sans-serif" font-weight="700" fill="#0f1b2d">質問</text>
<text x="630" y="315" text-anchor="middle" font-size="31" font-family="Arial, sans-serif" font-weight="700" fill="#0f1b2d">HTML記事</text>
<text x="995" y="345" text-anchor="middle" font-size="31" font-family="Arial, sans-serif" font-weight="700" fill="#0f1b2d">図解</text>
<text x="1345" y="315" text-anchor="middle" font-size="31" font-family="Arial, sans-serif" font-weight="700" fill="#0f1b2d">公開</text>
<g transform="translate(145,395)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">疑問をそのまま書く</text></g>
<g transform="translate(145,445)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">必要な深さを添える</text></g>
<g transform="translate(505,365)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">questions/&lt;slug&gt;/index.html</text></g>
<g transform="translate(505,415)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">本文とコード例を残す</text></g>
<g transform="translate(505,465)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">Sourcesを末尾に置く</text></g>
<g transform="translate(875,395)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">本文の文脈で作る</text></g>
<g transform="translate(875,445)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">読み返しを補助する</text></g>
<g transform="translate(1235,365)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">commit / push</text></g>
<g transform="translate(1235,415)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">GitHub Pagesで反映</text></g>
<g transform="translate(1235,465)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">URLで確認</text></g>
<circle cx="995" cy="452" r="42" fill="#eaf2ff" stroke="#2f6fcb"/><path d="M975 452h40M995 432v40" stroke="#2f6fcb" stroke-width="5"/>

<text x="800" y="850" text-anchor="middle" font-size="25" font-family="Arial, sans-serif" fill="#566981">質問は記事化の入力であり、公開できるノートへ変換する作業単位になる。</text>
</svg>
