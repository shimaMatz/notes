<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="t d"><title id="t">回収案内詳細画面</title><desc id="d">膨張品の状態、担当窓口、案内履歴、次の行動を示す画面</desc><rect width="900" height="560" fill="#f5efe7"/><rect x="190" y="28" width="520" height="504" rx="28" fill="#fff" stroke="#4b3724" stroke-width="4"/><text x="225" y="76" font-family="sans-serif" font-size="24" font-weight="700" fill="#4b3724">案内 #B-2048</text><rect x="225" y="98" width="450" height="72" rx="14" fill="#fff0d7"/><text x="245" y="128" font-family="sans-serif" font-size="18" font-weight="700" fill="#725018">膨張あり・持込前に窓口確認</text><text x="245" y="153" font-family="sans-serif" font-size="15" fill="#725018">端子へ触れず、耐熱容器に隔離</text><g font-family="sans-serif"><text x="225" y="210" font-size="17" font-weight="700" fill="#4b3724">担当</text><text x="330" y="210" font-size="17" fill="#5f554c">市役所 資源循環窓口</text><text x="225" y="250" font-size="17" font-weight="700" fill="#4b3724">履歴</text><text x="330" y="250" font-size="16" fill="#5f554c">10:12 状態判定を完了</text><text x="330" y="280" font-size="16" fill="#5f554c">10:14 窓口条件を確認</text><line x1="225" y1="310" x2="675" y2="310" stroke="#d8cec3"/><text x="225" y="352" font-size="18" font-weight="700" fill="#4b3724">次の行動</text><text x="225" y="384" font-size="16" fill="#5f554c">受付時間内に窓口へ電話し、膨張状態を伝える</text><rect x="225" y="414" width="450" height="58" rx="16" fill="#1f7a5b"/><text x="362" y="450" font-size="18" font-weight="700" fill="#fff">窓口へ確認する</text><text x="225" y="502" font-size="14" fill="#77695d">受付後、職員が匿名コードを読み取ります</text></g></svg>
