<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="t d"><title id="t">回収先一覧画面</title><desc id="d">製品条件、回収拠点、受付状況を示すスマートフォン向け画面</desc><rect width="900" height="560" fill="#eef4f1"/><rect x="190" y="28" width="520" height="504" rx="28" fill="#fff" stroke="#173f35" stroke-width="4"/><text x="225" y="78" font-family="sans-serif" font-size="26" font-weight="700" fill="#173f35">Battery Path</text><rect x="225" y="102" width="450" height="54" rx="14" fill="#dcebe5"/><text x="245" y="136" font-family="sans-serif" font-size="18" fill="#173f35">モバイルバッテリー・膨張あり</text><text x="225" y="190" font-family="sans-serif" font-size="17" fill="#50645f">近い順　営業中　膨張品対応</text><g font-family="sans-serif"><rect x="225" y="214" width="450" height="92" rx="16" fill="#f7faf9" stroke="#7aa594"/><text x="245" y="247" font-size="19" font-weight="700" fill="#173f35">市役所 資源回収窓口</text><text x="245" y="278" font-size="16" fill="#50645f">0.8 km・17:00まで・受付中</text><rect x="574" y="236" width="78" height="34" rx="17" fill="#1f7a5b"/><text x="593" y="259" font-size="14" fill="#fff">案内</text><rect x="225" y="322" width="450" height="92" rx="16" fill="#f7faf9" stroke="#7aa594"/><text x="245" y="355" font-size="19" font-weight="700" fill="#173f35">中央電器 回収カウンター</text><text x="245" y="386" font-size="16" fill="#50645f">1.4 km・膨張品は受付不可</text><rect x="225" y="438" width="450" height="58" rx="16" fill="#fff0d7"/><text x="245" y="474" font-size="16" fill="#725018">発熱・発煙時は持ち運ばず緊急窓口へ</text></g></svg>
