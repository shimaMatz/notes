<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Expo GoではなくDev Build前提</title><desc id="desc">MapboxとExpoは併用できるが、実装の前提はExpo GoではなくDevelopment Buildになる。</desc>
<defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#c9d5e7" flood-opacity="0.45"/></filter></defs>
<rect width="1600" height="900" fill="#fbfcfe"/><rect x="8" y="8" width="1584" height="884" fill="none" stroke="#0f1b2d" stroke-width="2"/>
<text x="800" y="70" text-anchor="middle" font-size="24" letter-spacing="10" font-family="Arial, sans-serif" font-weight="700" fill="#667996">COMPATIBILITY</text>
<text x="800" y="132" text-anchor="middle" font-size="50" font-family="Arial, sans-serif" font-weight="700" fill="#0f1b2d">Expo GoではなくDev Build前提</text>
<text x="800" y="184" text-anchor="middle" font-size="25" font-family="Arial, sans-serif" fill="#566981">MapboxはネイティブSDKを土台にするため、Expoの使い方を選ぶ</text>

<rect x="110" y="280" width="380" height="330" rx="22" fill="#fff" stroke="#c5d1df" filter="url(#shadow)"/>
<rect x="610" y="220" width="380" height="450" rx="22" fill="#fff" stroke="#2f6fcb" stroke-width="3" filter="url(#shadow)"/>
<rect x="1110" y="280" width="380" height="330" rx="22" fill="#fff" stroke="#c5d1df" filter="url(#shadow)"/>
<text x="300" y="345" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#0f1b2d">Expo Go</text>
<text x="800" y="300" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#0f1b2d">Development Build</text>
<text x="1300" y="345" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#0f1b2d">Prebuild</text>
<g transform="translate(165,420)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">手軽に試す</text></g>
<g transform="translate(165,470)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">native codeは不可</text></g>
<g transform="translate(665,390)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">Mapboxを組み込む</text></g>
<g transform="translate(665,440)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">実機で検証する</text></g>
<g transform="translate(665,490)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">EAS Buildと相性</text></g>
<g transform="translate(1165,420)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">native設定を生成</text></g>
<g transform="translate(1165,470)"><circle cx="0" cy="-7" r="5" fill="#0f3f89"/><text x="20" y="0" font-size="22" font-family="Arial, sans-serif" fill="#10213b">深い調整へ進む</text></g>
<path d="M490 445h120M990 445h120" stroke="#2f6fcb" stroke-width="5" stroke-linecap="round"/>
<text x="800" y="735" text-anchor="middle" font-size="26" font-family="Arial, sans-serif" fill="#10213b">MapboxをExpoで使うなら、Expo Goの手軽さから一段降りる</text>

<text x="800" y="850" text-anchor="middle" font-size="25" font-family="Arial, sans-serif" fill="#566981">MapboxとExpoは併用できるが、実装の前提はExpo GoではなくDevelopment Buildになる。</text>
</svg>
