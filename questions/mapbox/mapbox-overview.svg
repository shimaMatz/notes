<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Mapbox overview diagram</title>
  <desc id="desc">A diagram showing Mapbox maps, search, navigation, and data services around a central application.</desc>
  <rect width="1200" height="720" fill="#fcfaf6" />
  <rect x="40" y="40" width="1120" height="640" rx="28" fill="#fff8ef" stroke="#d4c8b8" stroke-width="4" />
  <rect x="420" y="240" width="360" height="180" rx="24" fill="#9a3412" />
  <text x="600" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" font-weight="700" fill="#fff8ef">Mapbox</text>
  <text x="600" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#fff8ef">location platform</text>
  <rect x="100" y="100" width="250" height="110" rx="20" fill="#f6d7c6" stroke="#9a3412" stroke-width="3" />
  <text x="225" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#241f1a">Maps</text>
  <text x="225" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6a5f55">map display and styling</text>
  <rect x="850" y="100" width="250" height="110" rx="20" fill="#f6d7c6" stroke="#9a3412" stroke-width="3" />
  <text x="975" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#241f1a">Search</text>
  <text x="975" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6a5f55">place and address lookup</text>
  <rect x="100" y="490" width="250" height="110" rx="20" fill="#f6d7c6" stroke="#9a3412" stroke-width="3" />
  <text x="225" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#241f1a">Navigation</text>
  <text x="225" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6a5f55">routing and guidance</text>
  <rect x="850" y="490" width="250" height="110" rx="20" fill="#f6d7c6" stroke="#9a3412" stroke-width="3" />
  <text x="975" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#241f1a">Data</text>
  <text x="975" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6a5f55">studio and tiling</text>
  <line x1="350" y1="155" x2="420" y2="250" stroke="#9a3412" stroke-width="6" />
  <line x1="850" y1="155" x2="780" y2="250" stroke="#9a3412" stroke-width="6" />
  <line x1="350" y1="545" x2="420" y2="410" stroke="#9a3412" stroke-width="6" />
  <line x1="850" y1="545" x2="780" y2="410" stroke="#9a3412" stroke-width="6" />
</svg>
