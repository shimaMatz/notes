<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">多頭飼育問題の早期相談と一時預かり調整の全体像</title>
  <desc id="desc">相談、動物リスト、一時預かり、支援記録をつなぐ小規模サービスの図</desc>
  <rect width="960" height="540" fill="#fff8ef"/>
  <rect x="48" y="42" width="864" height="456" rx="28" fill="#fcfaf6" stroke="#d4c8b8" stroke-width="3"/>
  <text x="80" y="96" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="27" font-weight="700" fill="#241f1a">多頭飼育の早期相談を記録と預かり枠で支える</text>
  <text x="80" y="132" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#6a5f55">深刻化する前の相談、動物リスト、支援者、一時預かり枠を軽くそろえる。</text>
  <g font-family="'Hiragino Sans','Yu Gothic',sans-serif">
    <rect x="92" y="198" width="176" height="116" rx="18" fill="#f6d7c6" stroke="#9a3412" stroke-width="2"/>
    <text x="128" y="238" font-size="21" font-weight="700" fill="#241f1a">相談</text>
    <text x="112" y="268" font-size="16" fill="#6a5f55">早期把握</text>
    <rect x="310" y="198" width="176" height="116" rx="18" fill="#ffffff" stroke="#d4c8b8" stroke-width="2"/>
    <text x="344" y="238" font-size="21" font-weight="700" fill="#241f1a">動物リスト</text>
    <text x="334" y="268" font-size="16" fill="#6a5f55">頭数・健康・不妊</text>
    <rect x="528" y="198" width="176" height="116" rx="18" fill="#ffffff" stroke="#d4c8b8" stroke-width="2"/>
    <text x="562" y="238" font-size="21" font-weight="700" fill="#241f1a">預かり枠</text>
    <text x="554" y="268" font-size="16" fill="#6a5f55">支援者・期間</text>
    <rect x="382" y="372" width="196" height="78" rx="18" fill="#241f1a"/>
    <text x="410" y="405" font-size="20" font-weight="700" fill="#fff8ef">支援記録</text>
    <text x="410" y="432" font-size="15" fill="#f8ede3">対応履歴 / 次回確認</text>
    <path d="M272 256 H306" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M490 256 H524" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M480 318 V366" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
