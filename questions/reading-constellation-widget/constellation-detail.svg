<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="t d"><title id="t">読書星座詳細画面</title><desc id="d">一冊の読了日、星の配置履歴、次に結ぶ本を示す画面</desc><rect width="960" height="600" fill="#ece9f3"/><rect x="210" y="35" width="540" height="530" rx="30" fill="#fff" stroke="#15162a" stroke-width="5"/><text x="250" y="85" font-family="sans-serif" font-size="17" fill="#66657b">← 6月の星図</text><text x="250" y="127" font-family="serif" font-size="27" fill="#1d1b35">風景についての本</text><circle cx="320" cy="215" r="45" fill="#f0b95d"/><circle cx="306" cy="201" r="7" fill="#fff4c9"/><g font-family="sans-serif" fill="#1d1b35"><text x="400" y="180" font-size="16">所有者: 自分</text><text x="400" y="212" font-size="16">読了: 2026-06-19</text><text x="400" y="244" font-size="16">色: 余韻の黄</text><text x="250" y="305" font-size="19">配置履歴</text><text x="275" y="340" font-size="15">20:42  背表紙から書名候補を確認</text><text x="275" y="372" font-size="15">20:44  星を右上へ配置</text><text x="275" y="404" font-size="15">未接続  次の一冊を選択</text></g><line x1="262" y1="332" x2="262" y2="400" stroke="#9a79c6" stroke-width="5"/><text x="250" y="447" font-family="sans-serif" font-size="15" fill="#66657b">次につなぐ本</text><rect x="250" y="463" width="210" height="58" rx="15" fill="#f0edf7"/><text x="275" y="498" font-family="serif" font-size="17">先月の短編集</text><rect x="478" y="463" width="232" height="58" rx="15" fill="#403267"/><text x="520" y="498" font-family="sans-serif" font-size="17" fill="#fff">一本の線で結ぶ</text><text x="250" y="548" font-family="sans-serif" font-size="13" fill="#77758a">元画像は端末内。同期するのは書名・星・線だけ。</text></svg>
