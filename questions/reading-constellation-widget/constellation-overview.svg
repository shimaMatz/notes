<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="t d"><title id="t">読書星座一覧画面</title><desc id="d">今月読み終えた本の星図と未配置の一冊を示す画面</desc><defs><linearGradient id="g" x2="1" y2="1"><stop stop-color="#121832"/><stop offset="1" stop-color="#3b2758"/></linearGradient></defs><rect width="960" height="600" fill="#ece9f3"/><rect x="210" y="35" width="540" height="530" rx="30" fill="url(#g)" stroke="#15162a" stroke-width="5"/><text x="250" y="90" font-family="serif" font-size="27" fill="#fff">読書星座 · 6月</text><text x="250" y="120" font-family="sans-serif" font-size="14" fill="#bfc5df">今月 4冊 · 今年 23冊</text><g stroke="#7784ba" stroke-width="2"><line x1="315" y1="210" x2="430" y2="165"/><line x1="430" y1="165" x2="545" y2="245"/><line x1="545" y1="245" x2="635" y2="190"/></g><g fill="#f7d37d"><circle cx="315" cy="210" r="9"/><circle cx="430" cy="165" r="13"/><circle cx="545" cy="245" r="10"/><circle cx="635" cy="190" r="8"/></g><g fill="#fff" font-family="sans-serif" font-size="13"><text x="285" y="235">旅の本</text><text x="400" y="145">短編集</text><text x="515" y="270">科学</text><text x="615" y="170">随筆</text></g><rect x="250" y="330" width="460" height="105" rx="18" fill="#fff" fill-opacity=".1"/><text x="275" y="363" font-family="sans-serif" font-size="15" fill="#bfc5df">未配置の一冊</text><text x="275" y="397" font-family="serif" font-size="21" fill="#fff">風景についての本</text><rect x="575" y="365" width="110" height="42" rx="21" fill="#f7d37d"/><text x="600" y="392" font-family="sans-serif" font-size="15" fill="#28203c">星を置く</text><rect x="250" y="465" width="460" height="60" rx="17" fill="#211d3f"/><text x="275" y="502" font-family="sans-serif" font-size="16" fill="#d9dcef">ウィジェットには今月の星図を表示中</text></svg>
