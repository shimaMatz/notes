<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">読み終えた本が星図になる「読書星座」ウィジェット事業案</title><desc id="desc">「読書星座」は、読み終えた本の背表紙や表紙を端末内で読み取り、一冊を一つの星として私</desc>
