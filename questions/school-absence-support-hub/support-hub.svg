<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">不登校の地域学び場運営支援サービスの流れ</title>
  <desc id="desc">保護者、支援員、居場所、記録をつなぐ図</desc>
  <rect width="960" height="540" fill="#fff7ef" />
  <rect x="42" y="44" width="876" height="452" rx="28" fill="#fffdf9" stroke="#d4c8b8" stroke-width="2" />
  <text x="68" y="92" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="28" font-weight="700" fill="#241f1a">
    学び場は増やせても、保護者連絡と参加記録の運営は薄い
  </text>
  <rect x="78" y="166" width="180" height="112" rx="18" fill="#f6d7c6" stroke="#9a3412" />
  <rect x="294" y="166" width="180" height="112" rx="18" fill="#fce7d6" stroke="#9a3412" />
  <rect x="510" y="166" width="180" height="112" rx="18" fill="#fdeedf" stroke="#9a3412" />
  <rect x="726" y="166" width="156" height="112" rx="18" fill="#fff2e8" stroke="#9a3412" />
  <text x="100" y="206" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#241f1a">予約</text>
  <text x="100" y="238" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">参加日</text>
  <text x="100" y="262" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">希望支援</text>
  <text x="316" y="206" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#241f1a">当日運営</text>
  <text x="316" y="238" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">出席</text>
  <text x="316" y="262" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">体調</text>
  <text x="532" y="206" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#241f1a">保護者連絡</text>
  <text x="532" y="238" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">相談メモ</text>
  <text x="532" y="262" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">共有</text>
  <text x="748" y="206" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#241f1a">記録</text>
  <text x="748" y="238" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">月報</text>
  <text x="748" y="262" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#241f1a">支援履歴</text>
  <path d="M258 222 H294" stroke="#9a3412" stroke-width="4" />
  <path d="M474 222 H510" stroke="#9a3412" stroke-width="4" />
  <path d="M690 222 H726" stroke="#9a3412" stroke-width="4" />
  <rect x="92" y="334" width="776" height="116" rx="24" fill="#241f1a" opacity="0.92" />
  <text x="124" y="378" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#fff8ef">
    既存手段の限界
  </text>
  <text x="124" y="412" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#fff8ef">
    チャットは相談に向くが、参加履歴や支援メモが散りやすい
  </text>
  <text x="124" y="440" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#fff8ef">
    学校向け出欠システムは、学校外の居場所運営には重くて合わない
  </text>
</svg>
