<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">結論の確認点</title><desc id="desc">毎日操作させるのではなく、暦と地域の変化が先に届き、気づいた時だけ一つ標本を残せる静かな反復が商品です</desc>
<rect width="1200" height="675" fill="#fff"/><rect x="0.5" y="0.5" width="1199" height="674" fill="none" stroke="#111" stroke-width="1"/>
<text x="600" y="72" text-anchor="middle" font-size="24" letter-spacing="8" font-family="Arial, sans-serif" fill="#687386">CHECKPOINTS</text>
<text x="86" y="145" font-size="42" font-family="Arial, sans-serif" font-weight="700" fill="#111">結論の確認点</text>
<g transform="translate(110,335)"><circle cx="0" cy="-7" r="6" fill="#111"/><text x="22" y="0" font-size="23" font-family="Arial, sans-serif" fill="#111">背景更新の制約で変化が遅れるため、節気アセットを事…</text></g>
<g transform="translate(110,399)"><circle cx="0" cy="-7" r="6" fill="#111"/><text x="22" y="0" font-size="23" font-family="Arial, sans-serif" fill="#111">生成物が均質になるリスクを避け、公開アートは人が制…</text></g>
<g transform="translate(110,463)"><circle cx="0" cy="-7" r="6" fill="#111"/><text x="22" y="0" font-size="23" font-family="Arial, sans-serif" fill="#111">国立天文台暦計算室「二十四節気」</text></g>
<circle cx="745" cy="288" r="150" fill="#f1f1f1"/><path d="M650 320c52-118 152-118 204 0" fill="none" stroke="#111" stroke-width="6"/><rect x="610" y="370" width="292" height="18" fill="#111"/><rect x="960" y="170" width="80" height="290" fill="none" stroke="#111" stroke-width="2"/><path d="M982 220h36M982 280h36M982 340h36M982 400h36" stroke="#111" stroke-width="3"/>
<text x="600" y="604" text-anchor="middle" font-size="25" font-family="Arial, sans-serif" fill="#333">毎日操作させるのではなく、暦と地域の変化が先に届き、気づいた時だけ一つ標本を残せる…</text>
