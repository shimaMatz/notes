<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="t d"><title id="t">芒種の庭詳細</title><desc id="d">庭の変化履歴、所有者、次の観察を示す画面</desc><rect width="900" height="560" fill="#e9f0e8"/><rect x="170" y="26" width="560" height="508" rx="28" fill="#fff" stroke="#365947" stroke-width="4"/><text x="205" y="74" font-family="serif" font-size="30" fill="#365947">芒種の庭</text><text x="590" y="72" font-family="sans-serif" font-size="15" fill="#718177">所有者: あなた</text><rect x="205" y="96" width="490" height="150" rx="20" fill="#223d31"/><circle cx="600" cy="135" r="28" fill="#ffe7a1"/><path d="M205 220 Q280 145 350 220 T500 220 T695 220 V246 H205Z" fill="#6f9574"/><g font-family="sans-serif"><text x="205" y="286" font-size="17" font-weight="700" fill="#365947">変化履歴</text><text x="225" y="322" font-size="15" fill="#68736d">06/16 朝　雨粒の層が追加</text><text x="225" y="352" font-size="15" fill="#68736d">06/17 夕　葉色が一段深くなる</text><text x="225" y="382" font-size="15" fill="#68736d">06/19 朝　あなたの空色を保存</text><line x1="205" y1="405" x2="695" y2="405" stroke="#ced9d1"/><text x="205" y="442" font-size="17" font-weight="700" fill="#365947">次の小さな観察</text><rect x="205" y="460" width="490" height="48" rx="14" fill="#dcebdc"/><text x="285" y="491" font-size="16" fill="#365947">今日いちばん濃い緑を一つ選ぶ</text></g></svg>
