<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">病児保育のキャンセル枠と引き継ぎの全体像</title>
  <desc id="desc">家庭、施設、勤務先連絡、利用記録をつなぐ小規模サービスの図</desc>
  <rect width="960" height="540" fill="#fff8ef"/>
  <rect x="48" y="42" width="864" height="456" rx="28" fill="#fcfaf6" stroke="#d4c8b8" stroke-width="3"/>
  <text x="80" y="96" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="27" font-weight="700" fill="#241f1a">病児保育の空き枠・持ち物・連絡をそろえる</text>
  <text x="80" y="132" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#6a5f55">急な発熱時に、予約待ち、キャンセル、持ち物、勤務先連絡が分断されやすい。</text>
  <g font-family="'Hiragino Sans','Yu Gothic',sans-serif">
    <rect x="92" y="198" width="176" height="116" rx="18" fill="#f6d7c6" stroke="#9a3412" stroke-width="2"/>
    <text x="128" y="238" font-size="21" font-weight="700" fill="#241f1a">家庭</text>
    <text x="112" y="268" font-size="16" fill="#6a5f55">発熱・予約待ち</text>
    <rect x="310" y="198" width="176" height="116" rx="18" fill="#ffffff" stroke="#d4c8b8" stroke-width="2"/>
    <text x="344" y="238" font-size="21" font-weight="700" fill="#241f1a">施設</text>
    <text x="334" y="268" font-size="16" fill="#6a5f55">空き枠・持ち物</text>
    <rect x="528" y="198" width="176" height="116" rx="18" fill="#ffffff" stroke="#d4c8b8" stroke-width="2"/>
    <text x="562" y="238" font-size="21" font-weight="700" fill="#241f1a">連絡</text>
    <text x="554" y="268" font-size="16" fill="#6a5f55">職場・家族</text>
    <rect x="382" y="372" width="196" height="78" rx="18" fill="#241f1a"/>
    <text x="420" y="405" font-size="20" font-weight="700" fill="#fff8ef">利用記録</text>
    <text x="420" y="432" font-size="15" fill="#f8ede3">空き枠 / 欠席 / 実績</text>
    <path d="M272 256 H306" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M490 256 H524" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
    <path d="M480 318 V366" stroke="#9a3412" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
