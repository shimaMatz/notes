<svg xmlns="http://www.w3.org/2000/svg" width="390" height="760" viewBox="0 0 390 760" role="img" aria-labelledby="t d"><title id="t">進行中の茶タイマー</title><desc id="d">抽出の残り時間、触覚の節目、調整履歴、次の操作を示す画面</desc><rect width="390" height="760" rx="34" fill="#ebe5dc"/><rect x="18" y="18" width="354" height="724" rx="28" fill="#fffaf2"/><text x="38" y="60" font-family="sans-serif" font-size="18" fill="#51463d">‹ タイマー</text><text x="195" y="110" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#75685c">煎茶 ・ 午後</text><circle cx="195" cy="238" r="102" fill="#dce6d2"/><circle cx="195" cy="238" r="82" fill="none" stroke="#fffaf2" stroke-width="12"/><path d="M195 156 A82 82 0 0 1 270 271" fill="none" stroke="#597456" stroke-width="12" stroke-linecap="round"/><text x="195" y="233" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="700" fill="#3f5940">0:48</text><text x="195" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#637360">次の触覚まで 18秒</text><text x="38" y="387" font-family="sans-serif" font-size="15" font-weight="700" fill="#51463d">この一服</text><text x="49" y="420" font-family="sans-serif" font-size="13" fill="#80746a">所有者　わたし</text><text x="49" y="447" font-family="sans-serif" font-size="13" fill="#80746a">開始　14:32:10 ・ 目標 1:30</text><text x="49" y="474" font-family="sans-serif" font-size="13" fill="#80746a">演出　水面 / 音なし / 触覚あり</text><rect x="38" y="509" width="314" height="88" rx="18" fill="#f2e9dc"/><text x="57" y="541" font-family="sans-serif" font-size="14" font-weight="700" fill="#5b4e44">前回の調整</text><text x="57" y="570" font-family="sans-serif" font-size="13" fill="#80746a">1:20で少し薄い → 今回 +10秒</text><rect x="38" y="620" width="148" height="48" rx="24" fill="#eee4d7"/><text x="86" y="650" font-family="sans-serif" font-size="14" fill="#66594e">一時停止</text><rect x="204" y="620" width="148" height="48" rx="24" fill="#526d50"/><text x="250" y="650" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff">完了する</text><text x="135" y="706" font-family="sans-serif" font-size="12" fill="#94887d">音　　　触覚　　　画面</text></svg>
