<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">伝統工芸の継承リスク共有サービス</title>
  <desc id="desc">職人、道具と原材料、指導可能工程の情報を共有台帳に集め、リスク判定、支援、研修につなぐ流れ</desc>
  <rect width="960" height="540" fill="#fff7ef"/>
  <rect x="40" y="38" width="880" height="464" rx="28" fill="#fffdf9" stroke="#d4c8b8" stroke-width="2"/>
  <text x="70" y="88" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="28" font-weight="700" fill="#241f1a">点在する継承情報を、支援判断につながる台帳へ</text>
  <text x="70" y="121" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="17" fill="#6a5f55">売上管理ではなく「何が・誰に依存し・いつ途切れそうか」を年2回更新する</text>

  <g font-family="'Hiragino Sans','Yu Gothic',sans-serif">
    <rect x="70" y="158" width="210" height="76" rx="16" fill="#f6d7c6" stroke="#9a3412"/>
    <text x="94" y="190" font-size="20" font-weight="700" fill="#241f1a">職人・指導者</text>
    <text x="94" y="216" font-size="15" fill="#6a5f55">工程 / 指導可否 / 後継候補</text>
    <rect x="70" y="252" width="210" height="76" rx="16" fill="#f6d7c6" stroke="#9a3412"/>
    <text x="94" y="284" font-size="20" font-weight="700" fill="#241f1a">道具・原材料</text>
    <text x="94" y="310" font-size="15" fill="#6a5f55">供給者 / 備蓄 / 代替可否</text>
    <rect x="70" y="346" width="210" height="76" rx="16" fill="#f6d7c6" stroke="#9a3412"/>
    <text x="94" y="378" font-size="20" font-weight="700" fill="#241f1a">組合・施設</text>
    <text x="94" y="404" font-size="15" fill="#6a5f55">更新担当 / 支援実績 / 課題</text>

    <rect x="354" y="188" width="252" height="204" rx="26" fill="#241f1a"/>
    <text x="480" y="235" text-anchor="middle" font-size="24" font-weight="700" fill="#fff8ef">継承リスク共有台帳</text>
    <text x="480" y="276" text-anchor="middle" font-size="17" fill="#fff8ef">関係情報を共同更新</text>
    <text x="480" y="310" text-anchor="middle" font-size="17" fill="#fff8ef">供給者1人・代替なしを警告</text>
    <text x="480" y="344" text-anchor="middle" font-size="17" fill="#fff8ef">変更履歴と支援候補を出力</text>

    <rect x="680" y="158" width="210" height="76" rx="16" fill="#efb79d" stroke="#9a3412"/>
    <text x="704" y="190" font-size="20" font-weight="700" fill="#241f1a">優先支援</text>
    <text x="704" y="216" font-size="15" fill="#6a5f55">補助・備蓄・発注</text>
    <rect x="680" y="252" width="210" height="76" rx="16" fill="#efb79d" stroke="#9a3412"/>
    <text x="704" y="284" font-size="20" font-weight="700" fill="#241f1a">研修接続</text>
    <text x="704" y="310" font-size="15" fill="#6a5f55">指導者と希望者の面談</text>
    <rect x="680" y="346" width="210" height="76" rx="16" fill="#efb79d" stroke="#9a3412"/>
    <text x="704" y="378" font-size="20" font-weight="700" fill="#241f1a">定期確認</text>
    <text x="704" y="404" font-size="15" fill="#6a5f55">半年ごとの更新会議</text>
  </g>

  <g stroke="#9a3412" stroke-width="4" fill="none">
    <path d="M280 196 H354"/><path d="M280 290 H354"/><path d="M280 384 H354"/>
    <path d="M606 196 H680"/><path d="M606 290 H680"/><path d="M606 384 H680"/>
  </g>
  <g fill="#9a3412">
    <path d="M354 196 l-12 -8 v16z"/><path d="M354 290 l-12 -8 v16z"/><path d="M354 384 l-12 -8 v16z"/>
    <path d="M680 196 l-12 -8 v16z"/><path d="M680 290 l-12 -8 v16z"/><path d="M680 384 l-12 -8 v16z"/>
  </g>
</svg>
