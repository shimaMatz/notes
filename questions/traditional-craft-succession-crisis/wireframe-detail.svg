<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">継承リスク項目の詳細・操作画面</title>
  <desc id="desc">漆刷毛の供給状況、依存関係、履歴、担当者、次の支援アクションを表示するアプリ画面のワイヤーフレーム</desc>
  <rect width="960" height="640" fill="#f3efe7"/>
  <rect x="34" y="28" width="892" height="584" rx="24" fill="#fffdf9" stroke="#c8bbab" stroke-width="2"/>
  <rect x="34" y="28" width="892" height="64" rx="24" fill="#241f1a"/><rect x="34" y="68" width="892" height="24" fill="#241f1a"/>
  <text x="68" y="69" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="22" font-weight="700" fill="#fff8ef">継承リスク台帳</text>

  <text x="70" y="132" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#9a3412">← 一覧へ戻る</text>
  <text x="70" y="177" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="28" font-weight="700" fill="#241f1a">漆刷毛・仕上げ用</text>
  <rect x="342" y="148" width="86" height="32" rx="16" fill="#f6d7c6"/><text x="385" y="169" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#9a3412">緊急</text>
  <text x="70" y="207" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#6a5f55">道具 / 最終更新 42日前 / 管理担当 山田</text>

  <rect x="70" y="232" width="518" height="136" rx="18" fill="#fff6f1" stroke="#d36b3d"/>
  <text x="94" y="264" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" font-weight="700" fill="#9a3412">リスク判定</text>
  <g font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#241f1a">
    <text x="94" y="300">供給者</text><text x="220" y="300" font-weight="700">1事業者</text>
    <text x="94" y="329">代替品</text><text x="220" y="329" font-weight="700">なし</text>
    <text x="344" y="300">在庫見込み</text><text x="474" y="300" font-weight="700">約8か月</text>
    <text x="344" y="329">後継候補</text><text x="474" y="329" font-weight="700">未登録</text>
  </g>

  <rect x="610" y="232" width="280" height="136" rx="18" fill="#f7eee5"/>
  <text x="634" y="264" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" font-weight="700" fill="#241f1a">次のアクション</text>
  <text x="634" y="298" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="15" fill="#241f1a">供給者ヒアリングを設定</text>
  <text x="634" y="325" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#6a5f55">期限: 6月30日 / 担当: 山田</text>
  <rect x="634" y="338" width="170" height="34" rx="10" fill="#9a3412"/><text x="719" y="361" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff8ef">完了として記録</text>

  <rect x="70" y="394" width="518" height="176" rx="18" fill="#fffdf9" stroke="#d4c8b8"/>
  <text x="94" y="428" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" font-weight="700" fill="#241f1a">依存する工程</text>
  <g font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="14">
    <rect x="94" y="448" width="470" height="42" rx="9" fill="#f7eee5"/><text x="112" y="475" fill="#241f1a">漆塗り・上塗り</text><text x="444" y="475" fill="#9a3412">3工房</text>
    <rect x="94" y="500" width="470" height="42" rx="9" fill="#f7eee5"/><text x="112" y="527" fill="#241f1a">蒔絵・仕上げ</text><text x="444" y="527" fill="#9a3412">2工房</text>
  </g>

  <rect x="610" y="394" width="280" height="176" rx="18" fill="#fffdf9" stroke="#d4c8b8"/>
  <text x="634" y="428" font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" font-weight="700" fill="#241f1a">更新履歴</text>
  <g font-family="'Hiragino Sans','Yu Gothic',sans-serif" font-size="13" fill="#6a5f55">
    <circle cx="642" cy="462" r="5" fill="#9a3412"/><text x="658" y="467">5/08 在庫量を更新</text>
    <line x1="642" y1="468" x2="642" y2="501" stroke="#d4c8b8" stroke-width="2"/>
    <circle cx="642" cy="508" r="5" fill="#9a3412"/><text x="658" y="513">4/12 代替なしを確認</text>
    <line x1="642" y1="514" x2="642" y2="545" stroke="#d4c8b8" stroke-width="2"/>
    <circle cx="642" cy="552" r="5" fill="#9a3412"/><text x="658" y="557">3/20 担当者を設定</text>
  </g>
</svg>
