<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="t d"><title id="t">復帰事案詳細</title><desc id="d">受傷履歴、担当、現在の復帰段階と次の行動を示す画面</desc><rect width="900" height="560" fill="#f4f0eb"/><rect x="170" y="26" width="560" height="508" rx="24" fill="#fff" stroke="#4c3c32" stroke-width="4"/><text x="205" y="72" font-family="sans-serif" font-size="24" font-weight="700" fill="#3f332c">A. Sato / 事案 #014</text><rect x="205" y="94" width="490" height="62" rx="14" fill="#fff0ef"/><text x="225" y="132" font-family="sans-serif" font-size="18" font-weight="700" fill="#a43832">参加不可・受診確認待ち</text><g font-family="sans-serif"><text x="205" y="198" font-size="17" font-weight="700" fill="#3f332c">担当</text><text x="315" y="198" font-size="16" fill="#665b54">安全責任者 田中 / 保護者 佐藤</text><text x="205" y="240" font-size="17" font-weight="700" fill="#3f332c">履歴</text><text x="315" y="240" font-size="15" fill="#665b54">14:06 接触後に即時離脱</text><text x="315" y="270" font-size="15" fill="#665b54">14:18 保護者へ引渡し</text><text x="315" y="300" font-size="15" fill="#665b54">14:22 受診案内を送信</text><line x1="205" y1="328" x2="695" y2="328" stroke="#d9cec6"/><text x="205" y="370" font-size="18" font-weight="700" fill="#3f332c">次の行動</text><text x="205" y="402" font-size="16" fill="#665b54">保護者が受診済みを回答 → 安全責任者が確認</text><rect x="205" y="430" width="490" height="58" rx="16" fill="#203b63"/><text x="351" y="467" font-size="18" font-weight="700" fill="#fff">受診確認を送る</text><text x="205" y="516" font-size="13" fill="#7e7168">緊急症状があればアプリを待たず119番へ</text></g></svg>
